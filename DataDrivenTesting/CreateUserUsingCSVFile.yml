http:
  method: POST
  url: "{{baseUrlTDD}}/api/users"
  headers:
    - name: x-api-key
      value: reqres_1f5c662008d74ffc93882dd86bcbe461
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "{{nameValue}}",
          "job": "{{jobValue}}" 
        }
