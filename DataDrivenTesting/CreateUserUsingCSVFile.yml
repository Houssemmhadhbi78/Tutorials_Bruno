    - type: tests
      code: |-
        test("status code test",function(){
          expect(res.getStatus()).to.equal(201);
        });

        test("name data type test",function(){
          expect(res.getBody().name).to.be.a('string');
        });

        test("name value test", function () {
          expect(res.getBody().name).to.equal(bru.interpolate("{{nameValue}}"));
        });

        test("job value test", function () {
          expect(res.getBody().job).to.equal(bru.interpolate("{{jobValue}}"));
        });

        test("status text check test",function(){
          expect(res.statusText).to.equal("Created");
        });

        test("header value test", function() { 
          expect(res.headers.connection).to.exist; 
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.body.name
      operator: eq
      value: "{{nameValue}}"
    - expression: res.body.job
      operator: eq
      value: "{{jobValue}}"

settings:
