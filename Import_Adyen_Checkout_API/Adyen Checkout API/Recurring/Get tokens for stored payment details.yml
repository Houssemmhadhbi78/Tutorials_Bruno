info:
  name: Get tokens for stored payment details
  type: http
  seq: 1
  tags:
    - Recurring

http:
  method: GET
  url: "{{baseUrl}}/storedPaymentMethods"
  params:
    - name: shopperReference
      value: ""
      type: query
      description: |-
        Your reference to uniquely identify this shopper, for example user ID or account ID. Minimum length: 3 characters.
        > Your reference must not include personally identifiable information (PII), for example name or email address.
      disabled: true
    - name: merchantAccount
      value: ""
      type: query
      description: Your merchant account.
      disabled: true
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK - the request has succeeded.
    request:
      url: "{{baseUrl}}/storedPaymentMethods"
      method: GET
      params:
        - name: shopperReference
          value: ""
          type: query
          description: |-
            Your reference to uniquely identify this shopper, for example user ID or account ID. Minimum length: 3 characters.
            > Your reference must not include personally identifiable information (PII), for example name or email address.
          disabled: true
        - name: merchantAccount
          value: ""
          type: query
          description: Your merchant account.
          disabled: true
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "merchantAccount": "",
            "shopperReference": "",
            "storedPaymentMethods": [
              {
                "brand": "",
                "expiryMonth": "",
                "expiryYear": "",
                "externalResponseCode": "",
                "externalTokenReference": "",
                "holderName": "",
                "iban": "",
                "id": "",
                "issuerName": "",
                "lastFour": "",
                "name": "",
                "networkTxReference": "",
                "ownerName": "",
                "shopperEmail": "",
                "shopperReference": "",
                "supportedRecurringProcessingModels": [],
                "type": ""
              }
            ]
          }

docs: |+
  Lists the tokens for stored payment details for the shopper identified in the path, if there are any available. The token ID can be used with payment requests for the shopper's payment. A summary of the stored details is included.

