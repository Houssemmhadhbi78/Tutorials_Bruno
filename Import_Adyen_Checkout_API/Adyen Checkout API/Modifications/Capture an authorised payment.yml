info:
  name: Capture an authorised payment
  type: http
  seq: 4
  tags:
    - Modifications

http:
  method: POST
  url: "{{baseUrl}}/payments/:paymentPspReference/captures"
  headers:
    - name: Idempotency-Key
      value: 37ca9c97-d1d1-4c62-89e8-706891a563ed
      description: A unique identifier for the message with a maximum of 64 characters (we recommend a UUID).
  params:
    - name: paymentPspReference
      value: ""
      type: path
      description: The [`pspReference`](https://docs.adyen.com/api-explorer/#/CheckoutService/latest/post/payments__resParam_pspReference) of the payment that you want to capture.
  body:
    type: json
    data: |-
      {
        "amount": {
          "currency": "",
          "value": 0
        },
        "lineItems": [
          {
            "amountExcludingTax": 0,
            "amountIncludingTax": 0,
            "brand": "",
            "color": "",
            "description": "",
            "id": "",
            "imageUrl": "",
            "itemCategory": "",
            "manufacturer": "",
            "productUrl": "",
            "quantity": 0,
            "receiverEmail": "",
            "size": "",
            "sku": "",
            "taxAmount": 0,
            "taxPercentage": 0,
            "upc": ""
          }
        ],
        "merchantAccount": "",
        "reference": "",
        "splits": [
          {
            "account": "",
            "amount": {
              "currency": "",
              "value": 0
            },
            "description": "",
            "reference": "",
            "type": "BalanceAccount"
          }
        ]
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

