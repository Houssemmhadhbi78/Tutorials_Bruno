info:
  name: Update an authorised amount
  type: http
  seq: 2
  tags:
    - Modifications

http:
  method: POST
  url: "{{baseUrl}}/payments/:paymentPspReference/amountUpdates"
  headers:
    - name: Idempotency-Key
      value: 37ca9c97-d1d1-4c62-89e8-706891a563ed
      description: A unique identifier for the message with a maximum of 64 characters (we recommend a UUID).
  params:
    - name: paymentPspReference
      value: ""
      type: path
      description: The [`pspReference`](https://docs.adyen.com/api-explorer/#/CheckoutService/latest/post/payments__resParam_pspReference) of the payment.
  body:
    type: json
    data: |-
      {
        "amount": {
          "currency": "",
          "value": 0
        },
        "industryUsage": "delayedCharge",
        "merchantAccount": "",
        "reference": "",
        "splits": [
          {
            "account": "",
            "amount": {
              "currency": "",
              "value": 0
            },
            "description": "",
            "reference": "",
            "type": "BalanceAccount"
          }
        ]
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

