info:
  name: Create a payment session (POST)
  type: http
  seq: 1
  tags:
    - Classic_Checkout_SDK

http:
  method: POST
  url: "{{baseUrl}}/paymentSession"
  headers:
    - name: Idempotency-Key
      value: 37ca9c97-d1d1-4c62-89e8-706891a563ed
      description: A unique identifier for the message with a maximum of 64 characters (we recommend a UUID).
  body:
    type: json
    data: |-
      {
        "amount": {
          "currency": "EUR",
          "value": 17408
        },
        "channel": "Android",
        "countryCode": "NL",
        "merchantAccount": "YOUR_MERCHANT_ACCOUNT",
        "reference": "Your order number",
        "returnUrl": "app://",
        "sessionValidity": "2017-04-06T13:09:13Z",
        "shopperLocale": "nl_NL",
        "shopperReference": "YOUR_UNIQUE_SHOPPER_ID",
        "token": "TOKEN_YOU_GET_FROM_CHECKOUT_SDK"
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Example response for request 'enableOneClick'
    request:
      url: "{{baseUrl}}/paymentSession"
      method: POST
      headers:
        - name: Idempotency-Key
