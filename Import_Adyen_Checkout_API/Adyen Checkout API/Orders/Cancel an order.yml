info:
  name: Cancel an order
  type: http
  seq: 2
  tags:
    - Orders

http:
  method: POST
  url: "{{baseUrl}}/orders/cancel"
  headers:
    - name: Idempotency-Key
      value: 37ca9c97-d1d1-4c62-89e8-706891a563ed
      description: A unique identifier for the message with a maximum of 64 characters (we recommend a UUID).
  body:
    type: json
    data: |-
      {
        "merchantAccount": "YOUR_MERCHANT_ACCOUNT",
        "order": {
          "orderData": "823fh892f8f18f4...148f13f9f3f",
          "pspReference": "8815517812932012"
        }
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

