info:
  name: Get the balance of a gift card
  type: http
  seq: 3
  tags:
    - Orders

http:
  method: POST
  url: "{{baseUrl}}/paymentMethods/balance"
  headers:
    - name: Idempotency-Key
      value: 37ca9c97-d1d1-4c62-89e8-706891a563ed
      description: A unique identifier for the message with a maximum of 64 characters (we recommend a UUID).
  body:
    type: json
    data: |-
      {
        "merchantAccount": "YOUR_MERCHANT_ACCOUNT",
        "paymentMethod": {
          "cvc": "737",
          "number": "4126491073027401",
          "type": "givex"
        }
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
