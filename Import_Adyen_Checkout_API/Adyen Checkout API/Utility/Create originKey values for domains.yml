info:
  name: Create originKey values for domains
  type: http
  seq: 2
  tags:
    - Utility

http:
  method: POST
  url: "{{baseUrl}}/originKeys"
  headers:
    - name: Idempotency-Key
      value: 37ca9c97-d1d1-4c62-89e8-706891a563ed
      description: A unique identifier for the message with a maximum of 64 characters (we recommend a UUID).
  body:
    type: json
    data: |-
      {
        "originDomains": [
          "https://www.your-domain1.com",
          "https://www.your-domain2.com",
          "https://www.your-domain3.com"
        ]
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

