info:
  name: Submit details for a payment
  type: http
  seq: 5
  tags:
    - Payments

http:
  method: POST
  url: "{{baseUrl}}/payments/details"
  headers:
    - name: Idempotency-Key
      value: 37ca9c97-d1d1-4c62-89e8-706891a563ed
      description: A unique identifier for the message with a maximum of 64 characters (we recommend a UUID).
  body:
    type: json
    data: |-
      {
        "details": {
          "threeDSResult": "eyJ0cmFuc1N0YXR1cyI6IlkifQ=="
        }
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

