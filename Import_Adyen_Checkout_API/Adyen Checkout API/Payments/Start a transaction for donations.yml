info:
  name: Start a transaction for donations
  type: http
  seq: 2
  tags:
    - Payments

http:
  method: POST
  url: "{{baseUrl}}/donations"
  headers:
    - name: Idempotency-Key
      value: 37ca9c97-d1d1-4c62-89e8-706891a563ed
      description: A unique identifier for the message with a maximum of 64 characters (we recommend a UUID).
  body:
    type: json
    data: |-
      {
        "amount": {
          "currency": "EUR",
          "value": 1000
        },
        "donationAccount": "CHARITY_ACCOUNT",
        "donationOriginalPspReference": "991559660454807J",
        "donationToken": "YOUR_DONATION_TOKEN",
        "merchantAccount": "YOUR_MERCHANT_ACCOUNT",
        "paymentMethod": {
          "type": "scheme"
        },
        "reference": "YOUR_DONATION_REFERENCE",
        "returnUrl": "https://your-company.com/...",
        "shopperInteraction": "ContAuth"
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

