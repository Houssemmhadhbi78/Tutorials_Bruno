info:
  name: Create an order
  type: http
  seq: 1
  tags:
    - Orders

http:
  method: POST
  url: "{{baseUrl}}/orders"
  headers:
    - name: Idempotency-Key
      value: 37ca9c97-d1d1-4c62-89e8-706891a563ed
      description: A unique identifier for the message with a maximum of 64 characters (we recommend a UUID).
  body:
    type: json
    data: |-
      {
        "amount": {
          "currency": "EUR",
          "value": 2500
        },
        "merchantAccount": "YOUR_MERCHANT_ACCOUNT",
        "reference": "YOUR_ORDER_REFERENCE"
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

