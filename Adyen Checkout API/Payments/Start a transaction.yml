info:
  name: Start a transaction
  type: http
  seq: 4
  tags:
    - Payments

http:
  method: POST
  url: "{{baseUrl}}/payments"
  headers:
    - name: Idempotency-Key
      value: 37ca9c97-d1d1-4c62-89e8-706891a563ed
      description: A unique identifier for the message with a maximum of 64 characters (we recommend a UUID).
  body:
    type: json
    data: |-
      {
        "amount": {
          "currency": "USD",
          "value": 1000
        },
        "merchantAccount": "YOUR_MERCHANT_ACCOUNT",
        "paymentMethod": {
          "applePayToken": "VNRWtuNlNEWkRCSm1xWndjMDFFbktkQU...",
          "type": "applepay"
        },
        "reference": "Your order number",
        "returnUrl": "https://your-company.com/..."
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

