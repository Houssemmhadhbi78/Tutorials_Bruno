info:
  name: Get a payment link
  type: http
  seq: 2
  tags:
    - Payment_links

http:
  method: GET
  url: "{{baseUrl}}/paymentLinks/:linkId"
  params:
    - name: linkId
      value: ""
      type: path
      description: Unique identifier of the payment link.
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Example response for request 'basic'
    request:
      url: "{{baseUrl}}/paymentLinks/:linkId"
      method: GET
      params:
        - name: linkId
          value: ""
          type: path
          description: Unique identifier of the payment link.
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "amount": {
              "currency": "EUR",
              "value": 8700
            },
            "countryCode": "NL",
            "expiresAt": "2021-04-08T14:06:39Z",
            "id": "PL61C53A8B97E6915A",
            "merchantAccount": "YOUR_MERCHANT_ACCOUNT",
