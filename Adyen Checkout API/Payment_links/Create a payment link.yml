info:
  name: Create a payment link
  type: http
  seq: 1
  tags:
    - Payment_links

http:
  method: POST
  url: "{{baseUrl}}/paymentLinks"
  headers:
    - name: Idempotency-Key
      value: 37ca9c97-d1d1-4c62-89e8-706891a563ed
      description: A unique identifier for the message with a maximum of 64 characters (we recommend a UUID).
  body:
    type: json
    data: |-
      {
        "amount": {
          "currency": "BRL",
          "value": 1250
        },
        "billingAddress": {
          "city": "São Paulo",
          "country": "BR",
          "houseNumberOrName": "999",
          "postalCode": "59000060",
          "stateOrProvince": "SP",
          "street": "Roque Petroni Jr"
        },
        "countryCode": "BR",
        "deliveryAddress": {
          "city": "São Paulo",
          "country": "BR",
          "houseNumberOrName": "999",
          "postalCode": "59000060",
          "stateOrProvince": "SP",
          "street": "Roque Petroni Jr"
        },
        "merchantAccount": "YOUR_MERCHANT_ACCOUNT",
        "reference": "YOUR_ORDER_NUMBER",
        "shopperEmail": "test@email.com",
        "shopperLocale": "pt-BR",
        "shopperReference": "YOUR_UNIQUE_SHOPPER_ID"
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

