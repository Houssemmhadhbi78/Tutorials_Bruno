info:
  name: Update the status of a payment link
  type: http
  seq: 3
  tags:
    - Payment_links

http:
  method: PATCH
  url: "{{baseUrl}}/paymentLinks/:linkId"
  params:
    - name: linkId
      value: ""
      type: path
      description: Unique identifier of the payment link.
  body:
    type: json
    data: |-
      {
        "status": "expired"
      }
  auth:
    type: basic
    username: "{{username}}"
    password: "{{password}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

