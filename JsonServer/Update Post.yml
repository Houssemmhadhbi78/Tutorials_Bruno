info:
  name: Update Post
  type: http
  seq: 3

http:
  method: PUT
  url: http://localhost:3000/posts/{{postId}}
  body:
    type: json
    data: |2
        {
          "title": "json-server1",
          "author": "typicode12"
        }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setNextRequest("Get Created Post After Update");
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.id
        method: jsonq
      variable:
        name: postId
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
