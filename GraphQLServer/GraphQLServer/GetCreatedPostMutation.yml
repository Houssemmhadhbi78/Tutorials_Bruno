info:
  name: GetCreatedPostMutation
  type: graphql
  seq: 2

graphql:
  method: POST
  url: http://localhost:3000/
  body:
    query: |
      query GetCreatedPost($id: ID!) {
        Post(id: $id) {
          id
          title
          views
          user_id
        }
      }
    variables: |-
      {
        "id": "{{idValue}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
