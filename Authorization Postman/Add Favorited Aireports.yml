info:
  name: Add Favorited Aireports
  type: http
  seq: 4

http:
  method: POST
  url: https://airportgap.com/api/favorites
  body:
    type: form-urlencoded
    data:
      - name: airport_id
        value: DXB
      - name: note
        value: Favorite airport for Dubai trips
  auth:
    type: bearer
    token: "{{tokenValue}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
