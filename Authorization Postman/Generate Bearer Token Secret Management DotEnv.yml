info:
  name: Generate Bearer Token Secret Management DotEnv
  type: http
  seq: 9

http:
  method: POST
  url: https://airportgap.com/api/tokens
  body:
    type: json
    data: |-
      {
        "email":"{{emailValue}}",
        "password":"{{passwordEnvValue}}"
      }

runtime:
  variables:
    - name: emailValue
      value: houssem.mhadhbi@etik.com
    - name: PasswordValue
      value: 123Houssem&&
  scripts:
    - type: tests
      code: |-
        test("response time test",function(){
          expect(res.getResponseTime()).to.lte(1000);
        });
  assertions:
    - expression: res.responseTime
      operator: lte
      value: "1000"
  actions:
    - type: set-variable
      phase: after-response
      selector:
        expression: res.body.token
        method: jsonq
      variable:
        name: tokenValue
        scope: runtime

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
