info:
  name: API Key Authentication
  type: http
  seq: 11

http:
  method: GET
  url: https://api.openweathermap.org/data/2.5/weather?q=Kochi&appid={{apiKey}}
  params:
    - name: q
      value: Kochi
      type: query
    - name: appid
      value: "{{apiKey}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
