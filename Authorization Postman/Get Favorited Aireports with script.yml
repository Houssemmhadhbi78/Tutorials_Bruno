info:
  name: Get Favorited Aireports with script
  type: http
  seq: 8

http:
  method: GET
  url: https://airportgap.com/api/favorites

runtime:
  scripts:
    - type: before-request
      code: |-
        // passing single header one by one 

        // req.setHeader("Authorization","Bearer {{tokenValueScript}}");
        // req.setHeader("content-Type","application/json");

        // Or passing multiple headers
        req.setHeaders(
          { "content-type": "application/json", "Authorization": "Bearer {{tokenValueScript}}" });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
