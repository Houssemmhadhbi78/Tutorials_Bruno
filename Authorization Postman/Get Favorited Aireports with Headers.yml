info:
  name: Get Favorited Aireports with Headers
  type: http
  seq: 10

http:
  method: GET
  url: https://airportgap.com/api/favorites
  headers:
    - name: Content-Type
      value: application/json
    - name: Authorization
      value: Bearer {{tokenValueScript}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
